services:
  postgres:
    image: postgres:15-alpine
    container_name: blogcache_postgres
    env_file:
      - docker.env
    environment:
      POSTGRES_MULTIPLE_DATABASES: blogcache,blogcache_test
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-multiple-dbs.sh:/docker-entrypoint-initdb.d/init-multiple-dbs.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blogcache_network

  redis:
    image: redis:7-alpine
    container_name: blogcache_redis
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - blogcache_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: blogcache_app
    env_file:
      - docker.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - ./src:/app/src:ro
      - ./alembic:/app/alembic:ro
      - ./alembic.ini:/app/alembic.ini:ro
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        alembic upgrade head
        uvicorn src.blogcache.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - blogcache_network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  blogcache_network:
    driver: bridge
